# .github/workflows/release.yml
name: release

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@90a3faa9d0182683851fbfa97ca1a2cb983bfca3 #v6.2.1
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Update Homebrew tap formula
        if: startsWith(github.ref, 'refs/tags/')
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          TAP_REPO: youhide/homebrew-youhide
          RELEASE_REPO: ${{ github.repository }}
          PROJECT_NAME: hideDot
          FORMULA_NAME: hidedot
          BINARY_NAME: hidedot
          DESCRIPTION: "A dotfiles manager written in Go"
          HOMEPAGE: "https://github.com/youhide/hideDot"
          LICENSE: "GPL-3.0"
          TAG: ${{ github.ref_name }}
        run: bash .github/scripts/update-tap-formula.sh
